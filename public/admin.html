<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel — Cipa Gallery</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        min-height: 100vh;
        color: #fff;
      }

      /* ── LOGIN ── */
      #loginScreen {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .login-card {
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 20px;
        padding: 48px 40px;
        width: 360px;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      }

      .login-card h1 { font-size: 1.6rem; margin-bottom: 6px; }
      .login-card p { color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-bottom: 28px; }

      .login-card input {
        width: 100%;
        padding: 13px 18px;
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 12px;
        color: #fff;
        font-size: 1rem;
        margin-bottom: 14px;
        outline: none;
        transition: border 0.3s;
      }
      .login-card input:focus { border-color: #ff6b9d; }
      .login-card input::placeholder { color: rgba(255,255,255,0.4); }

      .btn-login {
        width: 100%;
        padding: 13px;
        background: linear-gradient(135deg, #ff6b9d, #c44b8a);
        border: none;
        border-radius: 12px;
        color: #fff;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
      }
      .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255,107,157,0.4); }

      #loginError {
        color: #ff6b6b;
        font-size: 0.82rem;
        margin-top: 10px;
        display: none;
      }

      /* ── ADMIN PANEL ── */
      #adminPanel { display: none; padding: 30px 20px; max-width: 1100px; margin: 0 auto; }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 36px;
        flex-wrap: wrap;
        gap: 10px;
      }
      header h1 { font-size: 1.6rem; }
      header h1 span { color: #ff6b9d; }

      .btn-logout {
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        color: #fff;
        padding: 8px 20px;
        border-radius: 10px;
        cursor: pointer;
        transition: background 0.2s;
      }
      .btn-logout:hover { background: rgba(255,255,255,0.2); }

      /* ── UPLOAD ZONE ── */
      .upload-section {
        background: rgba(255,255,255,0.06);
        border: 2px dashed rgba(255,107,157,0.4);
        border-radius: 20px;
        padding: 40px 30px;
        text-align: center;
        margin-bottom: 36px;
        transition: border-color 0.3s, background 0.3s;
        cursor: pointer;
      }
      .upload-section.drag-over {
        border-color: #ff6b9d;
        background: rgba(255,107,157,0.1);
      }

      .upload-icon { font-size: 3rem; margin-bottom: 12px; }
      .upload-section h3 { font-size: 1.1rem; margin-bottom: 6px; }
      .upload-section p { color: rgba(255,255,255,0.5); font-size: 0.83rem; margin-bottom: 20px; }

      #fileInput { display: none; }

      .btn-choose {
        display: inline-block;
        padding: 12px 28px;
        background: linear-gradient(135deg, #ff6b9d, #c44b8a);
        border: none;
        border-radius: 12px;
        color: #fff;
        font-size: 0.92rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s;
      }
      .btn-choose:hover { transform: translateY(-2px); }

      /* Preview sebelum upload */
      #previewList {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 20px;
        justify-content: center;
      }
      .preview-item {
        position: relative;
        width: 110px;
        height: 110px;
        border-radius: 12px;
        overflow: hidden;
        border: 2px solid rgba(255,255,255,0.15);
      }
      .preview-item img { width: 100%; height: 100%; object-fit: cover; }
      .preview-item .remove-preview {
        position: absolute;
        top: 4px; right: 4px;
        background: rgba(0,0,0,0.7);
        color: #fff;
        border: none;
        border-radius: 50%;
        width: 22px; height: 22px;
        font-size: 0.7rem;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
      }

      .btn-upload-now {
        display: block;
        margin: 16px auto 0;
        padding: 13px 36px;
        background: linear-gradient(135deg, #43e97b, #38f9d7);
        border: none;
        border-radius: 12px;
        color: #111;
        font-size: 0.95rem;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
      }
      .btn-upload-now:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(67,233,123,0.35); }
      .btn-upload-now:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

      /* Progress bar upload */
      #uploadStatus {
        text-align: center;
        margin-top: 12px;
        font-size: 0.88rem;
        color: rgba(255,255,255,0.7);
        min-height: 22px;
      }

      /* ── GALLERY GRID ── */
      .gallery-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }
      .gallery-header h2 { font-size: 1.2rem; }
      #photoCount { color: rgba(255,255,255,0.5); font-size: 0.85rem; }

      #adminGallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
        gap: 16px;
      }

      .admin-photo-card {
        background: rgba(255,255,255,0.06);
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,0.1);
        transition: transform 0.2s;
      }
      .admin-photo-card:hover { transform: translateY(-4px); }

      .admin-photo-card img {
        width: 100%;
        height: 160px;
        object-fit: cover;
        display: block;
      }
      .admin-photo-card .card-footer {
        padding: 10px 12px;
        display: flex;
        justify-content: flex-end;
      }
      .btn-delete {
        background: rgba(255, 80, 80, 0.2);
        border: 1px solid rgba(255,80,80,0.4);
        color: #ff6b6b;
        padding: 6px 14px;
        border-radius: 8px;
        font-size: 0.78rem;
        cursor: pointer;
        transition: background 0.2s;
      }
      .btn-delete:hover { background: rgba(255,80,80,0.4); }

      .empty-state {
        grid-column: 1/-1;
        text-align: center;
        padding: 60px 20px;
        color: rgba(255,255,255,0.4);
      }
      .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

      /* Toast notif */
      #toast {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%) translateY(80px);
        background: rgba(30,30,50,0.95);
        border: 1px solid rgba(255,255,255,0.15);
        color: #fff;
        padding: 12px 24px;
        border-radius: 12px;
        font-size: 0.88rem;
        transition: transform 0.3s ease;
        z-index: 9999;
        white-space: nowrap;
      }
      #toast.show { transform: translateX(-50%) translateY(0); }
      #toast.success { border-color: #43e97b; color: #43e97b; }
      #toast.error { border-color: #ff6b6b; color: #ff6b6b; }

      @media (max-width: 500px) {
        #adminPanel { padding: 20px 14px; }
        .login-card { padding: 36px 24px; }
      }
    </style>
  </head>
  <body>

    <!-- ── LOGIN SCREEN ── -->
    <div id="loginScreen">
      <div class="login-card">
        <h1>🔐 Admin Panel</h1>
        <p>Cipa Gallery — Masukkan password untuk lanjut</p>
        <input type="password" id="passwordInput" placeholder="Password admin" autocomplete="current-password" />
        <button class="btn-login" onclick="doLogin()">Masuk</button>
        <p id="loginError">❌ Password salah, coba lagi!</p>
      </div>
    </div>

    <!-- ── ADMIN PANEL ── -->
    <div id="adminPanel">
      <header>
        <h1>🌸 <span>Cipa</span> Gallery Admin</h1>
        <button class="btn-logout" onclick="doLogout()">Keluar</button>
      </header>

      <!-- Upload zone -->
      <div class="upload-section" id="dropZone">
        <div class="upload-icon">📷</div>
        <h3>Upload Foto Baru</h3>
        <p>Drag & drop foto di sini, atau klik tombol di bawah<br>Format: JPG, PNG, GIF, WebP — Max 20MB per foto</p>
        <input type="file" id="fileInput" multiple accept="image/*" />
        <button class="btn-choose" onclick="document.getElementById('fileInput').click()">Pilih Foto</button>

        <div id="previewList"></div>
        <button class="btn-upload-now" id="uploadBtn" onclick="uploadPhotos()" style="display:none" disabled>
          ⬆️ Upload Sekarang
        </button>
        <div id="uploadStatus"></div>
      </div>

      <!-- Gallery list -->
      <div class="gallery-header">
        <h2>📸 Foto Tersimpan</h2>
        <span id="photoCount">Memuat...</span>
      </div>
      <div id="adminGallery"></div>
    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <script>
      // ── STATE ──
      let adminPassword = '';
      let selectedFiles = [];

      // ── LOGIN / LOGOUT ──
      function doLogin() {
        const val = document.getElementById('passwordInput').value.trim();
        if (!val) return;

        // Verifikasi ke server
        fetch('/api/photos', {
          headers: { 'x-admin-password': val }
        }).then(r => {
          if (r.ok) {
            adminPassword = val;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadGallery();
          } else {
            showLoginError();
          }
        }).catch(() => showLoginError());
      }

      function showLoginError() {
        const err = document.getElementById('loginError');
        err.style.display = 'block';
        setTimeout(() => err.style.display = 'none', 3000);
      }

      function doLogout() {
        adminPassword = '';
        selectedFiles = [];
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('passwordInput').value = '';
        document.getElementById('previewList').innerHTML = '';
        document.getElementById('uploadBtn').style.display = 'none';
      }

      // Enter key untuk login
      document.getElementById('passwordInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') doLogin();
      });

      // ── DRAG & DROP ──
      const dropZone = document.getElementById('dropZone');

      dropZone.addEventListener('dragover', e => {
        e.preventDefault();
        dropZone.classList.add('drag-over');
      });
      dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
      dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
        addFiles(files);
      });

      document.getElementById('fileInput').addEventListener('change', e => {
        addFiles(Array.from(e.target.files));
        e.target.value = '';
      });

      function addFiles(files) {
        files.forEach(f => {
          if (!selectedFiles.find(sf => sf.name === f.name && sf.size === f.size)) {
            selectedFiles.push(f);
          }
        });
        renderPreviews();
      }

      function renderPreviews() {
        const list = document.getElementById('previewList');
        list.innerHTML = '';
        selectedFiles.forEach((f, i) => {
          const url = URL.createObjectURL(f);
          const item = document.createElement('div');
          item.className = 'preview-item';
          item.innerHTML = `
            <img src="${url}" alt="${f.name}" />
            <button class="remove-preview" onclick="removePreview(${i})">✕</button>
          `;
          list.appendChild(item);
        });

        const btn = document.getElementById('uploadBtn');
        if (selectedFiles.length > 0) {
          btn.style.display = 'block';
          btn.disabled = false;
          btn.textContent = `⬆️ Upload ${selectedFiles.length} Foto`;
        } else {
          btn.style.display = 'none';
        }
      }

      function removePreview(index) {
        selectedFiles.splice(index, 1);
        renderPreviews();
      }

      // ── UPLOAD ──
      async function uploadPhotos() {
        if (selectedFiles.length === 0) return;

        const btn = document.getElementById('uploadBtn');
        const status = document.getElementById('uploadStatus');
        btn.disabled = true;
        status.textContent = '⏳ Sedang mengupload...';

        const formData = new FormData();
        selectedFiles.forEach(f => formData.append('photos', f));

        try {
          const res = await fetch('/api/upload', {
            method: 'POST',
            headers: { 'x-admin-password': adminPassword },
            body: formData
          });

          const data = await res.json();
          if (res.ok) {
            showToast(`✅ ${data.uploaded.length} foto berhasil diupload!`, 'success');
            selectedFiles = [];
            renderPreviews();
            status.textContent = '';
            loadGallery();
          } else {
            showToast('❌ ' + data.error, 'error');
            status.textContent = '';
            btn.disabled = false;
          }
        } catch (err) {
          showToast('❌ Gagal upload, cek koneksi!', 'error');
          status.textContent = '';
          btn.disabled = false;
        }
      }

      // ── GALLERY ──
      async function loadGallery() {
        const grid = document.getElementById('adminGallery');
        const count = document.getElementById('photoCount');
        grid.innerHTML = '<p style="color:rgba(255,255,255,0.4);padding:30px">Memuat foto...</p>';

        try {
          const res = await fetch('/api/photos');
          const photos = await res.json();

          count.textContent = `${photos.length} foto`;

          if (photos.length === 0) {
            grid.innerHTML = `<div class="empty-state"><div class="icon">🌸</div><p>Belum ada foto. Upload dulu yuk!</p></div>`;
            return;
          }

          grid.innerHTML = '';
          photos.forEach(photo => {
            const card = document.createElement('div');
            card.className = 'admin-photo-card';
            card.innerHTML = `
              <img src="${photo.url}" alt="${photo.filename}" loading="lazy" />
              <div class="card-footer">
                <button class="btn-delete" onclick="deletePhoto('${photo.filename}', this)">🗑 Hapus</button>
              </div>
            `;
            grid.appendChild(card);
          });
        } catch (err) {
          grid.innerHTML = '<p style="color:#ff6b6b;padding:30px">Gagal memuat foto.</p>';
        }
      }

      async function deletePhoto(filename, btn) {
        if (!confirm(`Yakin hapus foto ini?`)) return;

        btn.disabled = true;
        btn.textContent = '...';

        try {
          const res = await fetch(`/api/photos/${filename}`, {
            method: 'DELETE',
            headers: { 'x-admin-password': adminPassword }
          });
          const data = await res.json();
          if (res.ok) {
            showToast('🗑 Foto dihapus!', 'success');
            loadGallery();
          } else {
            showToast('❌ ' + data.error, 'error');
            btn.disabled = false;
            btn.textContent = '🗑 Hapus';
          }
        } catch {
          showToast('❌ Gagal hapus foto', 'error');
          btn.disabled = false;
          btn.textContent = '🗑 Hapus';
        }
      }

      // ── TOAST ──
      function showToast(msg, type = '') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = `show ${type}`;
        setTimeout(() => t.className = '', 3000);
      }
    </script>
  </body>
</html>
